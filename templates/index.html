<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Habit Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f3;
      color: #1a1a1a;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container { max-width: 680px; margin: 0 auto; }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
      letter-spacing: -0.02em;
    }

    /* ── Add habit form ── */
    .add-form {
      display: flex;
      gap: 8px;
      margin-bottom: 1.5rem;
    }
    .add-form input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      background: #fff;
      outline: none;
      transition: border-color .15s;
    }
    .add-form input:focus { border-color: #534AB7; }
    .add-form button {
      padding: 10px 18px;
      background: #534AB7;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background .15s;
    }
    .add-form button:hover { background: #3C3489; }

    /* ── Habit card ── */
    .habit-card {
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 12px;
      padding: 1rem 1.25rem;
      margin-bottom: 12px;
    }

    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .habit-name {
      font-size: 15px;
      font-weight: 500;
    }

    .streak-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 20px;
      background: #EEEDFE;
      color: #3C3489;
    }

    .card-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-done {
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 500;
      border-radius: 6px;
      border: 1px solid #ddd;
      background: #fff;
      cursor: pointer;
      transition: background .15s, border-color .15s;
    }
    .btn-done:hover:not(:disabled) { background: #EAF3DE; border-color: #C0DD97; color: #27500A; }
    .btn-done.done { background: #EAF3DE; border-color: #C0DD97; color: #27500A; cursor: default; }
    .btn-done:disabled { opacity: 0.5; cursor: default; }

    .btn-delete {
      padding: 6px 10px;
      font-size: 12px;
      border-radius: 6px;
      border: 1px solid #ddd;
      background: #fff;
      cursor: pointer;
      color: #999;
      transition: background .15s, color .15s;
    }
    .btn-delete:hover { background: #FCEBEB; border-color: #F09595; color: #A32D2D; }

    /* ── Chart ── */
    .chart-wrap {
      margin-top: 14px;
      height: 80px;
    }

    /* ── Loading / empty ── */
    .state-msg {
      text-align: center;
      color: #999;
      font-size: 14px;
      padding: 2rem 0;
    }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1a1a1a;
      color: #fff;
      font-size: 13px;
      padding: 8px 18px;
      border-radius: 8px;
      transition: transform .25s ease;
      pointer-events: none;
      z-index: 999;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    @media (max-width: 480px) {
      .add-form { flex-direction: column; }
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Habit Tracker</h1>

  <form class="add-form" id="add-form">
    <input type="text" id="habit-input" placeholder="New habit (e.g. Read 20 pages)" maxlength="80" />
    <button type="submit">Add habit</button>
  </form>

  <div id="habits-list">
    <p class="state-msg">Loading...</p>
  </div>
</div>

<div id="toast"></div>

<script>
  const API = "";  // same origin — Flask serves this HTML
  const charts = {};

  // ── Fetch & render all habits ──────────────────────────────────────────────
  async function loadHabits() {
    const res = await fetch(`${API}/habits`);
    const habits = await res.json();
    const list = document.getElementById("habits-list");

    if (habits.length === 0) {
      list.innerHTML = `<p class="state-msg">No habits yet — add one above.</p>`;
      return;
    }

    list.innerHTML = "";
    habits.forEach(habit => {
      list.appendChild(buildCard(habit));
    });

    // Load charts for each habit after cards are in DOM
    habits.forEach(habit => loadChart(habit.id));
  }

  // ── Build a habit card element ─────────────────────────────────────────────
  function buildCard(habit) {
    const card = document.createElement("div");
    card.className = "habit-card";
    card.id = `habit-${habit.id}`;
    card.innerHTML = `
      <div class="card-top">
        <span class="habit-name">${escHtml(habit.name)}</span>
        <div class="card-actions">
          <span class="streak-badge">🔥 ${habit.streak} day streak</span>
          <button
            class="btn-done ${habit.done_today ? "done" : ""}"
            id="done-btn-${habit.id}"
            onclick="markDone(${habit.id})"
            ${habit.done_today ? "disabled" : ""}
          >${habit.done_today ? "✓ Done" : "Mark done"}</button>
          <button class="btn-delete" onclick="deleteHabit(${habit.id})" aria-label="Delete habit">✕</button>
        </div>
      </div>
      <div class="chart-wrap">
        <canvas id="chart-${habit.id}"></canvas>
      </div>
    `;
    return card;
  }

  // ── Load Chart.js bar chart for a habit ───────────────────────────────────
  async function loadChart(habitId) {
    const res = await fetch(`${API}/habits/${habitId}/stats`);
    const stats = await res.json();

    const canvas = document.getElementById(`chart-${habitId}`);
    if (!canvas) return;

    // Destroy old chart instance if re-rendering
    if (charts[habitId]) charts[habitId].destroy();

    charts[habitId] = new Chart(canvas, {
      type: "bar",
      data: {
        labels: stats.map(s => s.label),
        datasets: [{
          data: stats.map(s => s.completed ? 1 : 0),
          backgroundColor: stats.map(s => s.completed ? "#639922" : "#e8e8e8"),
          borderRadius: 4,
          borderSkipped: false,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: { enabled: false } },
        scales: {
          y: { display: false, min: 0, max: 1 },
          x: {
            grid: { display: false },
            ticks: { font: { size: 11 }, color: "#888" },
          }
        },
        animation: { duration: 400 }
      }
    });
  }

  // ── Mark habit as done today ───────────────────────────────────────────────
  async function markDone(habitId) {
    const btn = document.getElementById(`done-btn-${habitId}`);
    btn.disabled = true;
    btn.textContent = "Saving...";

    const res = await fetch(`${API}/habits/${habitId}/log`, { method: "POST" });
    if (res.status === 409) {
      showToast("Already logged today!");
      btn.textContent = "Mark done";
      btn.disabled = false;
      return;
    }

    const habit = await res.json();
    // Update streak badge
    const card = document.getElementById(`habit-${habitId}`);
    card.querySelector(".streak-badge").textContent = `🔥 ${habit.streak} day streak`;
    btn.textContent = "✓ Done";
    btn.classList.add("done");
    // Refresh chart
    loadChart(habitId);
    showToast("Habit logged! 🎉");
  }

  // ── Delete a habit ─────────────────────────────────────────────────────────
  async function deleteHabit(habitId) {
    if (!confirm("Delete this habit and all its logs?")) return;
    await fetch(`${API}/habits/${habitId}`, { method: "DELETE" });
    document.getElementById(`habit-${habitId}`)?.remove();
    if (document.getElementById("habits-list").children.length === 0) {
      document.getElementById("habits-list").innerHTML =
        `<p class="state-msg">No habits yet — add one above.</p>`;
    }
  }

  // ── Add new habit ──────────────────────────────────────────────────────────
  document.getElementById("add-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const input = document.getElementById("habit-input");
    const name = input.value.trim();
    if (!name) return;

    const btn = e.target.querySelector("button");
    btn.disabled = true;
    btn.textContent = "Adding...";

    const res = await fetch(`${API}/habits`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name }),
    });

    const habit = await res.json();
    const list = document.getElementById("habits-list");
    // Remove empty state message if present
    list.querySelector(".state-msg")?.remove();
    list.appendChild(buildCard(habit));
    loadChart(habit.id);

    input.value = "";
    btn.disabled = false;
    btn.textContent = "Add habit";
  });

  // ── Toast notification ─────────────────────────────────────────────────────
  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2500);
  }

  // ── Escape HTML to prevent XSS ─────────────────────────────────────────────
  function escHtml(str) {
    return str.replace(/[&<>"']/g, c =>
      ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c])
    );
  }

  // ── Boot ───────────────────────────────────────────────────────────────────
  loadHabits();
</script>
</body>
</html>
